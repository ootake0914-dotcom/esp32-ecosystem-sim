; LCDwiki ES3N28P — ESP32-S3 N16R8 + 2.8" ILI9341 (240x320)
; Pins match ../cheap-obsidian-display/main/board_pins.h
; Source: src/main.cpp

[platformio]
default_envs = obsidian-es3n28p

[env:obsidian-es3n28p]
platform = espressif32@6.11.0
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

; N16R8: 16MB flash + 8MB OPI PSRAM (board JSON still says N8; overrides below apply)
board_build.arduino.memory_type = qio_opi
board_build.flash_mode = qio
board_build.f_flash = 80000000L
board_upload.flash_size = 16MB
board_build.partitions = default_16MB.csv

lib_deps =
  bodmer/TFT_eSPI@^2.5.43

build_flags =
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DBOARD_HAS_PSRAM
  -DUSER_SETUP_LOADED=1
  -DILI9341_DRIVER=1
  -DTFT_WIDTH=240
  -DTFT_HEIGHT=320
  -DTFT_MOSI=11
  -DTFT_SCLK=12
  -DTFT_MISO=13
  -DTFT_CS=10
  -DTFT_DC=46
  -DTFT_RST=-1
  -DTFT_BL=45
  -DTFT_BACKLIGHT_ON=HIGH
  -DUSE_HSPI_PORT=1
  -DLOAD_GLCD=1
  -DSPI_FREQUENCY=40000000
  -DSPI_READ_FREQUENCY=20000000
